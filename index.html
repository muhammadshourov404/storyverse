<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryVerse — গল্পের জগৎ</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --surface: #16161f;
    --surface2: #1e1e2a;
    --border: rgba(255,255,255,0.07);
    --accent: #c8a96e;
    --accent2: #e8c98e;
    --accent-glow: rgba(200,169,110,0.3);
    --text: #e8e4d8;
    --text2: #a09880;
    --text3: #6a6358;
    --horror: #c0392b;
    --adventure: #2980b9;
    --romance: #c0577a;
    --drama: #8e44ad;
    --fantasy: #27ae60;
    --radius: 12px;
    --radius-lg: 20px;
    --shadow: 0 20px 60px rgba(0,0,0,0.6);
    --transition: 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  .light {
    --bg: #f5f0e8;
    --bg2: #ede8de;
    --bg3: #e5dfd2;
    --surface: #fff8ee;
    --surface2: #f0e8d8;
    --border: rgba(0,0,0,0.08);
    --accent: #8b6914;
    --accent2: #a07c20;
    --accent-glow: rgba(139,105,20,0.2);
    --text: #1a1510;
    --text2: #5a4e3a;
    --text3: #8a7a60;
    --shadow: 0 20px 60px rgba(0,0,0,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 18px;
    line-height: 1.7;
    min-height: 100vh;
    transition: background var(--transition), color var(--transition);
    overflow-x: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

  /* ── NAVBAR ── */
  .navbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 900;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    transition: background var(--transition);
  }
  .light .navbar { background: rgba(245,240,232,0.85); }

  .nav-logo {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.2rem;
    color: var(--accent);
    letter-spacing: 2px;
    cursor: pointer;
    text-shadow: 0 0 20px var(--accent-glow);
  }

  .nav-right { display: flex; gap: 12px; align-items: center; }

  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 6px 16px;
    border-radius: 40px;
    cursor: pointer;
    font-family: 'Crimson Pro', serif;
    font-size: 0.95rem;
    transition: all 0.25s;
  }
  .nav-btn:hover, .nav-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-glow);
  }

  .theme-toggle {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    transition: all 0.25s;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

  /* ── PAGES ── */
  .page { display: none; min-height: 100vh; padding-top: 70px; }
  .page.active { display: block; }

  /* ── HOME PAGE ── */
  .hero {
    position: relative;
    text-align: center;
    padding: 80px 32px 60px;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200,169,110,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-eyebrow {
    font-size: 0.75rem;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.8s 0.2s forwards;
  }

  .hero-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2.5rem, 6vw, 5rem);
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 0.8s 0.4s forwards;
  }
  .hero-title span { color: var(--accent); }

  .hero-sub {
    font-family: 'Tiro Bangla', serif;
    font-size: 1.1rem;
    color: var(--text2);
    max-width: 480px;
    margin: 0 auto 40px;
    opacity: 0;
    animation: fadeUp 0.8s 0.6s forwards;
  }

  .hero-divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 0 auto 60px;
    opacity: 0;
    animation: fadeUp 0.8s 0.8s forwards;
  }

  /* ── FILTER TABS ── */
  .filter-tabs {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 0 32px 40px;
    opacity: 0;
    animation: fadeUp 0.8s 1s forwards;
  }

  .filter-tab {
    padding: 8px 22px;
    border-radius: 40px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    font-family: 'Tiro Bangla', serif;
    font-size: 0.9rem;
    transition: all 0.25s;
  }
  .filter-tab:hover { border-color: var(--accent); color: var(--accent); }
  .filter-tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }

  /* ── STORY GRID ── */
  .stories-section { padding: 0 32px 80px; max-width: 1200px; margin: 0 auto; }

  .stories-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 28px;
  }

  .story-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
    animation: fadeUp 0.6s both;
  }
  .story-card:hover {
    transform: translateY(-8px);
    box-shadow: var(--shadow);
    border-color: var(--accent);
  }

  .card-image {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    background: var(--bg3);
    position: relative;
    overflow: hidden;
  }

  .card-image-placeholder {
    width: 100%;
    aspect-ratio: 16/9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    background: var(--bg3);
    position: relative;
    overflow: hidden;
  }
  .card-image-placeholder::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--genre-color, var(--accent)) 0%, transparent 60%);
    opacity: 0.15;
  }

  .card-body { padding: 20px; }

  .card-genre {
    display: inline-block;
    font-size: 0.72rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--genre-color, var(--accent));
    margin-bottom: 8px;
    font-family: 'Crimson Pro', serif;
  }

  .card-title {
    font-family: 'Tiro Bangla', serif;
    font-size: 1.15rem;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .card-title-en {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.75rem;
    color: var(--text3);
    margin-bottom: 10px;
    letter-spacing: 1px;
  }

  .card-desc {
    font-family: 'Tiro Bangla', serif;
    font-size: 0.88rem;
    color: var(--text2);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
  }

  .card-meta {
    font-size: 0.8rem;
    color: var(--text3);
    font-family: 'Crimson Pro', serif;
  }

  .card-read-btn {
    font-size: 0.8rem;
    color: var(--accent);
    font-family: 'Crimson Pro', serif;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-read-btn::after { content: '→'; transition: transform 0.2s; }
  .story-card:hover .card-read-btn::after { transform: translateX(4px); }

  /* ── READER PAGE ── */
  #reader-page {
    background: var(--bg);
    min-height: 100vh;
    display: none;
    flex-direction: column;
  }
  #reader-page.active { display: flex; }

  .reader-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 900;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 28px;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .light .reader-header { background: rgba(245,240,232,0.9); }

  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s;
    flex-shrink: 0;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  .reader-title {
    font-family: 'Tiro Bangla', serif;
    font-size: 1rem;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .reader-lang-btn {
    padding: 5px 14px;
    border-radius: 40px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    font-family: 'Crimson Pro', serif;
    font-size: 0.85rem;
    transition: all 0.25s;
    flex-shrink: 0;
  }
  .reader-lang-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Progress bar */
  .progress-bar {
    position: fixed;
    top: 64px; left: 0; right: 0;
    height: 2px;
    background: var(--bg3);
    z-index: 899;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 0.4s ease;
    box-shadow: 0 0 10px var(--accent-glow);
  }

  /* Scene container */
  .scene-container {
    flex: 1;
    padding-top: 70px;
    display: flex;
    flex-direction: column;
  }

  .scene-image-wrap {
    width: 100%;
    max-height: 55vh;
    overflow: hidden;
    position: relative;
    background: var(--bg2);
  }

  .scene-image {
    width: 100%;
    height: 55vh;
    object-fit: cover;
    display: block;
    transition: opacity 0.6s, transform 0.6s;
  }

  .scene-image-placeholder {
    width: 100%;
    height: 55vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    background: var(--bg2);
    position: relative;
  }
  .scene-image-placeholder::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, var(--genre-color, var(--accent)) 0%, transparent 70%);
    opacity: 0.08;
  }

  .scene-image-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 120px;
    background: linear-gradient(transparent, var(--bg));
    pointer-events: none;
  }

  /* Chapter badge */
  .chapter-badge {
    position: absolute;
    top: 16px; left: 16px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 4px 14px;
    border-radius: 40px;
    font-size: 0.78rem;
    letter-spacing: 2px;
    font-family: 'Crimson Pro', serif;
  }

  /* Scene number */
  .scene-counter {
    position: absolute;
    top: 16px; right: 16px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 4px 14px;
    border-radius: 40px;
    font-size: 0.78rem;
    font-family: 'Crimson Pro', serif;
  }

  /* Text area */
  .scene-text-area {
    background: var(--bg);
    padding: 32px 28px 120px;
    flex: 1;
    position: relative;
  }

  .scene-chapter-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.7rem;
    letter-spacing: 4px;
    color: var(--accent);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .scene-narration {
    font-family: 'Tiro Bangla', serif;
    font-size: 1.08rem;
    color: var(--text);
    line-height: 1.9;
    max-width: 700px;
    margin: 0 auto;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.5s, transform 0.5s;
  }
  .scene-narration.visible { opacity: 1; transform: none; }

  .scene-narration.en-text {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 1.15rem;
  }

  /* Navigation buttons */
  .scene-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    gap: 12px;
    padding: 16px 24px;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    z-index: 800;
  }
  .light .scene-nav { background: rgba(245,240,232,0.92); }

  .nav-scene-btn {
    flex: 1;
    padding: 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    font-family: 'Tiro Bangla', serif;
    font-size: 0.9rem;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .nav-scene-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
  .nav-scene-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .nav-scene-btn.primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 600;
  }
  .nav-scene-btn.primary:hover:not(:disabled) { background: var(--accent2); border-color: var(--accent2); color: var(--bg); }

  /* ── END SCREEN ── */
  .end-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px;
  }
  .end-screen.active { display: flex; }

  .end-icon { font-size: 4rem; margin-bottom: 24px; animation: pulse 2s infinite; }

  .end-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.8rem;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .end-story-title {
    font-family: 'Tiro Bangla', serif;
    font-size: 1.1rem;
    color: var(--text2);
    margin-bottom: 32px;
  }

  .end-divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 0 auto 32px;
  }

  .end-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

  .end-btn {
    padding: 12px 28px;
    border-radius: 40px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-family: 'Tiro Bangla', serif;
    font-size: 0.95rem;
    transition: all 0.25s;
  }
  .end-btn:hover { border-color: var(--accent); color: var(--accent); }
  .end-btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .end-btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  /* Scene transition */
  .scene-fade-out { animation: sceneOut 0.3s forwards; }
  .scene-fade-in { animation: sceneIn 0.4s forwards; }

  @keyframes sceneOut {
    to { opacity: 0; transform: scale(0.98); }
  }
  @keyframes sceneIn {
    from { opacity: 0; transform: scale(1.02); }
    to { opacity: 1; transform: scale(1); }
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 80px 32px;
    color: var(--text3);
    font-family: 'Tiro Bangla', serif;
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 16px; display: block; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .navbar { padding: 12px 16px; }
    .nav-logo { font-size: 1rem; }
    .hero { padding: 60px 16px 40px; }
    .filter-tabs { padding: 0 16px 32px; }
    .stories-section { padding: 0 16px 60px; }
    .stories-grid { grid-template-columns: 1fr 1fr; gap: 16px; }
    .scene-text-area { padding: 24px 16px 120px; }
    .scene-nav { padding: 12px 16px; }
  }

  @media (max-width: 400px) {
    .stories-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" id="main-nav">
  <div class="nav-logo" onclick="showPage('home')">✦ StoryVerse</div>
  <div class="nav-right">
    <button class="nav-btn active" onclick="switchLang('bn')" id="lang-bn">বাংলা</button>
    <button class="nav-btn" onclick="switchLang('en')" id="lang-en">English</button>
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙</button>
  </div>
</nav>

<!-- ════════════════════════════════════════
     HOME PAGE
════════════════════════════════════════ -->
<div id="home-page" class="page active">

  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-eyebrow" data-bn="গল্পের জগতে স্বাগতম" data-en="Welcome to the World of Stories">গল্পের জগতে স্বাগতম</div>
    <h1 class="hero-title">Story<span>Verse</span></h1>
    <p class="hero-sub" data-bn="প্রতিটি গল্প একটি নতুন পৃথিবী। ডুব দাও, হারিয়ে যাও।" data-en="Every story is a new world. Dive in, get lost.">প্রতিটি গল্প একটি নতুন পৃথিবী। ডুব দাও, হারিয়ে যাও।</p>
    <div class="hero-divider"></div>
  </section>

  <div class="filter-tabs" id="filter-tabs">
    <button class="filter-tab active" onclick="filterStories('all')" data-bn="সব গল্প" data-en="All Stories">সব গল্প</button>
    <button class="filter-tab" onclick="filterStories('horror')" data-bn="😱 হরর" data-en="😱 Horror">😱 হরর</button>
    <button class="filter-tab" onclick="filterStories('adventure')" data-bn="⚔️ অ্যাডভেঞ্চার" data-en="⚔️ Adventure">⚔️ অ্যাডভেঞ্চার</button>
    <button class="filter-tab" onclick="filterStories('romance')" data-bn="💕 রোমান্স" data-en="💕 Romance">💕 রোমান্স</button>
    <button class="filter-tab" onclick="filterStories('drama')" data-bn="🎭 ড্রামা" data-en="🎭 Drama">🎭 ড্রামা</button>
    <button class="filter-tab" onclick="filterStories('fantasy')" data-bn="🔮 ফ্যান্টাসি" data-en="🔮 Fantasy">🔮 ফ্যান্টাসি</button>
  </div>

  <section class="stories-section">
    <div class="stories-grid" id="stories-grid"></div>
  </section>

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let currentLang = 'bn';
let currentStory = null;
let currentSceneIndex = 0;
let allScenes = [];
let isDark = true;

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  renderStories(STORIES);
});

/* ═══════════════════════════════════════════════
   RENDER STORIES
═══════════════════════════════════════════════ */
function renderStories(stories) {
  const grid = document.getElementById('stories-grid');
  if (!stories.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><span class="icon">📚</span><span data-bn="এই ধরনের কোনো গল্প নেই" data-en="No stories in this category">${currentLang === 'bn' ? 'এই ধরনের কোনো গল্প নেই' : 'No stories in this category'}</span></div>`;
    return;
  }

  const genreColors = { horror: '#c0392b', adventure: '#2980b9', romance: '#c0577a', drama: '#8e44ad', fantasy: '#27ae60' };

  grid.innerHTML = stories.map((s, i) => {
    const color = genreColors[s.genre] || 'var(--accent)';
    const genreLabels = { horror: { bn: 'হরর', en: 'Horror' }, adventure: { bn: 'অ্যাডভেঞ্চার', en: 'Adventure' }, romance: { bn: 'রোমান্স', en: 'Romance' }, drama: { bn: 'ড্রামা', en: 'Drama' }, fantasy: { bn: 'ফ্যান্টাসি', en: 'Fantasy' } };
    const totalScenes = s.chapters.reduce((t, c) => t + c.scenes.length, 0);

    return `
    <div class="story-card" onclick="openStory(${s.id})" style="animation-delay:${i * 0.1}s">
      <div class="card-image-placeholder" style="--genre-color:${color}">
        <img src="${s.cover}" alt="${s.title[currentLang]}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">
        <span style="position:relative;z-index:1;font-size:2.5rem">${s.emoji}</span>
      </div>
      <div class="card-body">
        <div class="card-genre" style="color:${color}">${genreLabels[s.genre]?.[currentLang] || s.genre}</div>
        <div class="card-title" data-bn="${s.title.bn}" data-en="${s.title.en}">${s.title[currentLang]}</div>
        <div class="card-title-en">${currentLang === 'bn' ? s.title.en : s.title.bn}</div>
        <div class="card-desc" data-bn="${s.desc.bn}" data-en="${s.desc.en}">${s.desc[currentLang]}</div>
      </div>
      <div class="card-footer">
        <div class="card-meta">${s.chapters.length} ${currentLang === 'bn' ? 'অধ্যায়' : 'chapters'} · ${totalScenes} ${currentLang === 'bn' ? 'দৃশ্য' : 'scenes'}</div>
        <div class="card-read-btn">${currentLang === 'bn' ? 'পড়ুন' : 'Read'}</div>
      </div>
    </div>`;
  }).join('');
}

/* ═══════════════════════════════════════════════
   FILTER
═══════════════════════════════════════════════ */
function filterStories(genre) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  const filtered = genre === 'all' ? STORIES : STORIES.filter(s => s.genre === genre);
  renderStories(filtered);
}

/* ═══════════════════════════════════════════════
   OPEN / CLOSE STORY
═══════════════════════════════════════════════ */
function openStory(id) {
  currentStory = STORIES.find(s => s.id === id);
  if (!currentStory) return;

  // Flatten all scenes
  allScenes = [];
  currentStory.chapters.forEach(ch => {
    ch.scenes.forEach(sc => {
      allScenes.push({ ...sc, chapterTitle: ch.title });
    });
  });

  currentSceneIndex = 0;

  document.getElementById('reader-story-title').textContent = currentStory.title[currentLang];
  document.getElementById('main-nav').style.display = 'none';
  showPage('reader');
  renderScene();
}

function closeReader() {
  document.getElementById('end-screen').classList.remove('active');
  document.getElementById('main-nav').style.display = 'flex';
  showPage('home');
  currentStory = null;
  allScenes = [];
}

/* ═══════════════════════════════════════════════
   RENDER SCENE
═══════════════════════════════════════════════ */
function renderScene() {
  const scene = allScenes[currentSceneIndex];
  if (!scene) return;

  // Image
  const img = document.getElementById('scene-img');
  const placeholder = document.getElementById('scene-img-placeholder');
  if (scene.image) {
    img.src = scene.image;
    img.alt = '';
    placeholder.textContent = scene.emoji || '📖';
    placeholder.style.display = 'flex';
    img.style.display = 'none';
  } else {
    img.style.display = 'none';
    placeholder.style.display = 'flex';
    placeholder.textContent = scene.emoji || '📖';
  }

  // Chapter badge
  document.getElementById('chapter-badge').textContent = scene.chapterTitle[currentLang];

  // Scene counter
  document.getElementById('scene-counter').textContent = `${currentSceneIndex + 1} / ${allScenes.length}`;

  // Chapter title
  document.getElementById('scene-chapter-title').textContent = scene.chapterTitle[currentLang];

  // Narration
  const narration = document.getElementById('scene-narration');
  narration.classList.remove('visible', 'en-text');
  narration.textContent = scene.text[currentLang];
  if (currentLang === 'en') narration.classList.add('en-text');
  setTimeout(() => narration.classList.add('visible'), 100);

  // Progress
  const pct = ((currentSceneIndex + 1) / allScenes.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';

  // Buttons
  document.getElementById('prev-btn').disabled = currentSceneIndex === 0;
  const nextBtn = document.getElementById('next-btn');
  if (currentSceneIndex === allScenes.length - 1) {
    nextBtn.textContent = currentLang === 'bn' ? 'সমাপ্তি ✨' : 'The End ✨';
  } else {
    nextBtn.textContent = currentLang === 'bn' ? 'পরে →' : 'Next →';
  }
  document.getElementById('prev-btn').textContent = currentLang === 'bn' ? '← আগে' : '← Prev';

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ═══════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════ */
function nextScene() {
  if (currentSceneIndex === allScenes.length - 1) {
    showEndScreen();
    return;
  }
  currentSceneIndex++;
  renderScene();
}

function prevScene() {
  if (currentSceneIndex === 0) return;
  currentSceneIndex--;
  renderScene();
}

function restartStory() {
  document.getElementById('end-screen').classList.remove('active');
  currentSceneIndex = 0;
  renderScene();
}

function showEndScreen() {
  document.getElementById('end-screen').classList.add('active');
  document.getElementById('end-icon').textContent = currentStory.endEmoji || '✨';
  document.getElementById('end-title').textContent = currentStory.endTitle[currentLang];
  document.getElementById('end-story-title-display').textContent = currentStory.title[currentLang];

  // Update button texts
  document.querySelectorAll('#end-screen [data-bn]').forEach(el => {
    el.textContent = el.dataset[currentLang] || el.dataset.bn;
  });
}

/* ═══════════════════════════════════════════════
   LANGUAGE
═══════════════════════════════════════════════ */
function switchLang(lang) {
  currentLang = lang;
  document.getElementById('lang-bn').classList.toggle('active', lang === 'bn');
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  document.getElementById('reader-lang-btn').textContent = lang === 'bn' ? 'EN' : 'বাং';

  // Update all data-bn/en elements
  document.querySelectorAll('[data-bn]').forEach(el => {
    if (el.dataset[lang]) el.textContent = el.dataset[lang];
  });

  // Re-render stories grid
  const activeFilter = document.querySelector('.filter-tab.active');
  const genre = activeFilter?.getAttribute('onclick')?.match(/'(\w+)'/)?.[1] || 'all';
  const filtered = genre === 'all' ? STORIES : STORIES.filter(s => s.genre === genre);
  renderStories(filtered);

  // Update reader if open
  if (currentStory) {
    document.getElementById('reader-story-title').textContent = currentStory.title[lang];
    renderScene();
  }
}

function toggleReaderLang() {
  switchLang(currentLang === 'bn' ? 'en' : 'bn');
}

/* ═══════════════════════════════════════════════
   THEME
═══════════════════════════════════════════════ */
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
}

/* ═══════════════════════════════════════════════
   PAGE ROUTING
═══════════════════════════════════════════════ */
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(name + '-page').classList.add('active');
}
</script>
